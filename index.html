<!--
  index.html - Cytoscape.js Graph Viewer

  Purpose:
    - This file provides a lightweight interactive visualization of the social signal interpretation graph for autistic users.
    - It renders nodes and relationships defined in the sample Neo4j graph model exported from the database.

  Visualization Content:
    - Visualizes the core graph structure: Person, Statement, Tone, Expression, Context, LiteralMeaning, IntendedMeaning, Pattern, Situation, and Signal nodes,
      along with the typed relationships between them (e.g., SAID, HAS_TONE, HAS_CONTEXT, HAS_SIGNAL, REQUIRES, PREDICTS, DERIVED_AS, etc).
    - Designed to match the schema and data loaded into Neo4j via neo4j_implementation.cypher and described in NEO4J_SCHEMA.md.

  Data Source:
    - This page reads its element data from `graph/exports/cytoscape_elements.json`, which is generated by
      `graph/pipeline/export_graph_to_cytoscape.py`. Serve from the project root so the fetch path works.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="refresh" content="0; url=./app/web/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting...</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #f9fafb;
    }
    #cy {
      width: 100%;
      height: 100%;
    }
    .badge {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid #334155;
      color: #cbd5e1;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 6px;
      z-index: 10;
    }
    .controls {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #334155;
      color: #e2e8f0;
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      z-index: 10;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .controls label {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
  </style>
  <script src="https://unpkg.com/cytoscape@3.30.0/dist/cytoscape.min.js"></script>
</head>
<body>
  <div class="controls">
    <label><input id="toggleLiteral" type="checkbox" checked /> Literal channel</label>
    <label><input id="toggleInference" type="checkbox" checked /> Inference channel</label>
    <label><input id="toggleEdgeLabels" type="checkbox" /> Edge labels</label>
  </div>
  <div class="badge">Read top → bottom: observations → signals → patterns → intended meanings (p on PREDICTS edges).</div>
  <div id="cy"></div>

  <script>
    function prettifyType(type) {
      if (!type) return '';
      return String(type).replace(/_/g, ' ');
    }

    function fallbackLabel(data) {
      if (!data) return '';
      if (data.neo4jId) return String(data.neo4jId);
      if (data.id) return String(data.id).replace(/^[^:]+:/, '');
      return 'node';
    }

    function computeNodeDisplayLabel(data) {
      const nodeType = data?.label;

      if (nodeType === 'Person') return `Person: ${data.name || fallbackLabel(data)}`;
      if (nodeType === 'Statement') return `Statement: ${data.text || data.instanceId || fallbackLabel(data)}`;
      if (nodeType === 'Tone') return `Tone: ${data.value || fallbackLabel(data)}`;
      if (nodeType === 'Expression') return `Expression: ${data.value || fallbackLabel(data)}`;
      if (nodeType === 'Context') return `Context: ${data.value || fallbackLabel(data)}`;
      if (nodeType === 'LiteralMeaning') return `Literal meaning: ${data.value || fallbackLabel(data)}`;
      if (nodeType === 'IntendedMeaning') return `Intended meaning: ${data.value || fallbackLabel(data)}`;
      if (nodeType === 'Pattern') return `Pattern: ${data.patternId || fallbackLabel(data)}`;
      if (nodeType === 'Signal') {
        const kind = data.kind || 'signal';
        const valueId = data.valueId || fallbackLabel(data);
        return `Signal: ${kind} / ${valueId}`;
      }
      if (nodeType === 'Situation') {
        if (data.description) return data.description;
        return `Situation: ${data.situationId || fallbackLabel(data)}`;
      }

      return fallbackLabel(data);
    }

    function enrichElements(elements) {
      return (elements || []).map(el => {
        if (!el?.data) return el;

        if (el.data.source && el.data.target) {
          const typeStr = prettifyType(el.data.type);
          const p = el.data.probability;
          const displayType =
            p !== undefined && p !== null && String(p) !== ''
              ? `${typeStr} (p=${p})`
              : typeStr;
          return {
            ...el,
            data: {
              ...el.data,
              displayType
            }
          };
        }

        return {
          ...el,
          data: {
            ...el.data,
            displayLabel: computeNodeDisplayLabel(el.data)
          }
        };
      });
    }

    function buildTypeLayeredPositions(elements) {
      // Row order: scenario frame → observations (including surface meaning of words) → derived signals → patterns → intended meanings.
      const typeOrder = [
        'Situation',
        'Person',
        'Statement',
        'LiteralMeaning',
        'Tone',
        'Expression',
        'Context',
        'Signal',
        'Pattern',
        'IntendedMeaning'
      ];
      const typeToRow = Object.fromEntries(typeOrder.map((t, i) => [t, i]));
      const grouped = new Map();

      for (const el of elements) {
        const d = el?.data;
        if (!d || d.source || d.target) continue;

        const type = d.label || 'Other';
        if (!grouped.has(type)) grouped.set(type, []);
        grouped.get(type).push(el);
      }

      for (const [type, list] of grouped.entries()) {
        list.sort((a, b) => {
          const la = String(a.data?.displayLabel || a.data?.id || '');
          const lb = String(b.data?.displayLabel || b.data?.id || '');
          return la.localeCompare(lb);
        });
      }

      const colGap = 280;
      const rowGap = 260;
      const startX = 120;
      const startY = 120;
      const laneSplitAfterRow = 6; // after Context (observation block vs signal / pattern / interpretation)
      const laneGap = 220; // visual separation between “what happened” and signal/intent strip
      const positions = {};

      for (const [type, list] of grouped.entries()) {
        const rowIndex = typeToRow[type] ?? typeOrder.length;
        const channelOffset = rowIndex > laneSplitAfterRow ? laneGap : 0;
        const rowY = startY + rowIndex * rowGap + channelOffset;

        list.forEach((nodeEl, idx) => {
          const colX = startX + idx * colGap;
          positions[nodeEl.data.id] = { x: colX, y: rowY };
        });
      }

      return positions;
    }

    function classifyChannel(edgeType) {
      // "Literal" = what the user can directly observe (words, tone, face, context framing).
      // "Inference" = pattern / derivation edges (signals and suggested intents).
      const literalTypes = new Set([
        'SAID',
        'HAS_EXPRESSION',
        'HAS_TONE',
        'HAS_LITERAL_MEANING',
        'HAS_CONTEXT',
        'HAS_SPEAKER',
        'HAS_STATEMENT'
      ]);
      const inferenceTypes = new Set(['HAS_SIGNAL', 'SUGGESTS', 'DERIVED_AS', 'REQUIRES', 'PREDICTS']);

      if (literalTypes.has(edgeType)) return 'literal';
      if (inferenceTypes.has(edgeType)) return 'inference';
      return 'other';
    }

    fetch(`graph/exports/cytoscape_elements.json?v=${Date.now()}`, { cache: 'no-store' })
      .then(res => res.json())
      .then(graph => {
        const elements = enrichElements(graph.elements);
        const cy = cytoscape({
          container: document.getElementById('cy'),
          elements,
          minZoom: 0.35,
          maxZoom: 3.5,
          wheelSensitivity: 0.15,
          style: [
            {
              selector: 'node',
              style: {
                'background-color': '#4f46e5',
                'label': 'data(displayLabel)',
                'color': '#e5e7eb',
                'font-size': 16,
                'text-valign': 'center',
                'text-halign': 'center',
                'text-wrap': 'wrap',
                'text-max-width': '300px',
                'text-background-color': '#0f172a',
                'text-background-opacity': 0.9,
                'text-background-padding': 5,
                'text-border-color': '#334155',
                'text-border-width': 1,
                'width': 56,
                'height': 56
              }
            },
            {
              selector: 'node[label = "Person"]',
              style: {
                'shape': 'ellipse'
              }
            },
            {
              selector: 'node[label = "LiteralMeaning"]',
              style: {
                'background-color': '#38bdf8',
                'shape': 'round-rectangle'
              }
            },
            {
              selector: 'node[label = "IntendedMeaning"]',
              style: {
                'background-color': '#22c55e',
                'shape': 'round-rectangle'
              }
            },
            {
              selector: 'node[label = "Pattern"]',
              style: {
                'background-color': '#c026d3',
                'shape': 'octagon',
                'width': 72,
                'height': 72
              }
            },
            {
              selector: 'node[label = "Tone"]',
              style: {
                'background-color': '#f97316',
                'shape': 'hexagon'
              }
            },
            {
              selector: 'node[label = "Expression"]',
              style: {
                'background-color': '#06b6d4',
                'shape': 'diamond'
              }
            },
            {
              selector: 'node[label = "Context"]',
              style: {
                'background-color': '#a855f7',
                'shape': 'round-rectangle'
              }
            },
            {
              selector: 'node[label = "Situation"]',
              style: {
                'background-color': '#64748b',
                'shape': 'round-rectangle',
                'width': 90,
                'height': 62
              }
            },
            {
              selector: 'node[label = "Signal"]',
              style: {
                'background-color': '#eab308',
                'shape': 'round-diamond'
              }
            },
            {
              selector: 'edge',
              style: {
                'width': 3,
                'line-color': '#9ca3af',
                'target-arrow-color': '#9ca3af',
                'target-arrow-shape': 'triangle',
                'curve-style': 'unbundled-bezier',
                'control-point-step-size': 35,
                'label': '',
                'font-size': 13,
                'text-background-color': '#020617',
                'text-background-opacity': 0.95,
                'text-background-padding': 4,
                'text-rotation': 'autorotate',
                'color': '#e5e7eb'
              }
            },
            {
              selector: 'edge.show-label',
              style: {
                'label': 'data(displayType)'
              }
            },
            {
              selector: 'edge.channel-literal',
              style: {
                'line-color': '#60a5fa',
                'target-arrow-color': '#60a5fa'
              }
            },
            {
              selector: 'edge.channel-inference',
              style: {
                'line-color': '#34d399',
                'target-arrow-color': '#34d399'
              }
            },
            {
              selector: 'edge[type = "HAS_LITERAL_MEANING"]',
              style: {
                'line-style': 'dashed',
                'width': 4
              }
            },
            {
              selector: 'edge[type = "SUGGESTS"]',
              style: {
                'line-style': 'dotted',
                'width': 4
              }
            },
            {
              selector: 'edge[type = "REQUIRES"]',
              style: {
                'line-style': 'dashed',
                'line-color': '#94a3b8',
                'target-arrow-color': '#94a3b8',
                'width': 2
              }
            },
            {
              selector: 'edge.channel-inference[type = "PREDICTS"]',
              style: {
                'line-style': 'solid',
                'width': 5,
                'line-color': '#fbbf24',
                'target-arrow-color': '#fbbf24'
              }
            },
            {
              selector: 'edge.channel-inference[type = "DERIVED_AS"]',
              style: {
                'line-style': 'solid',
                'width': 2,
                'line-color': '#a78bfa',
                'target-arrow-color': '#a78bfa'
              }
            },
            {
              selector: 'edge:selected',
              style: {
                'label': 'data(displayType)',
                'width': 3,
                'line-color': '#cbd5e1',
                'target-arrow-color': '#cbd5e1'
              }
            }
          ],
          layout: {
            name: 'preset',
            positions: buildTypeLayeredPositions(elements),
            animate: false,
            fit: true,
            padding: 150
          }
        });

        cy.batch(() => {
          cy.edges().forEach(edge => {
            const channel = classifyChannel(edge.data('type'));
            edge.addClass(`channel-${channel}`);

            if (channel === 'literal') {
              edge.connectedNodes().addClass('node-literal');
            } else if (channel === 'inference') {
              edge.connectedNodes().addClass('node-inference');
            }
          });
        });

        function applyChannelVisibility() {
          const showLiteral = document.getElementById('toggleLiteral').checked;
          const showInference = document.getElementById('toggleInference').checked;

          cy.batch(() => {
            cy.edges('.channel-literal').style('display', showLiteral ? 'element' : 'none');
            cy.edges('.channel-inference').style('display', showInference ? 'element' : 'none');
            cy.edges('.channel-other').style('display', (showLiteral || showInference) ? 'element' : 'none');

            cy.nodes().forEach(node => {
              const isLiteralNode = node.hasClass('node-literal');
              const isInferenceNode = node.hasClass('node-inference');
              const showNode =
                (showLiteral && isLiteralNode) ||
                (showInference && isInferenceNode) ||
                (!isLiteralNode && !isInferenceNode);
              node.style('display', showNode ? 'element' : 'none');
            });
          });

          const visible = cy.elements(':visible');
          if (visible.nonempty()) cy.fit(visible, 120);
        }

        function applyEdgeLabelVisibility() {
          const showEdgeLabels = document.getElementById('toggleEdgeLabels').checked;
          cy.batch(() => {
            if (showEdgeLabels) {
              cy.edges().addClass('show-label');
            } else {
              cy.edges().removeClass('show-label');
            }
          });
        }

        document.getElementById('toggleLiteral').addEventListener('change', applyChannelVisibility);
        document.getElementById('toggleInference').addEventListener('change', applyChannelVisibility);
        document.getElementById('toggleEdgeLabels').addEventListener('change', applyEdgeLabelVisibility);
        applyChannelVisibility();
        applyEdgeLabelVisibility();

        cy.zoom(0.9);
        cy.center();

        cy.on('tap', 'node', evt => {
          const d = evt.target.data();
          console.log('Node data:', d);
        });
      })
      .catch(err => console.error('Error loading graph:', err));
  </script>
</body>
</html>
